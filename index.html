<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle</title>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <div class="container" id="container">
        <div class="cube-container">
            <div class="cube" id="cube">
                <div class="cube-face help" id="helpFace">
                    <div class="help-content">
                        <h3>How to Play</h3>
                        <p>Arrange the numbered tiles in order by sliding them into the empty space. Get tiles 1-15 in order, with the empty space in the bottom-right corner.</p>
                        
                        <h3>Controls</h3>
                        <ul>
                            <li><kbd>Arrow Keys</kbd> or <kbd>Click</kbd> - Move tiles</li>
                            <li><kbd>ESC</kbd> - Reset</li>
                            <li><kbd>ENTER</kbd> - Play / Pause / Resume</li>
                        </ul>
                    </div>
                </div>
                <div class="cube-face game" id="gameFace">
                    <div class="board" id="board"></div>
                </div>
                <div class="cube-face themes" id="themesFace">
                    <div class="themes-title">Themes</div>
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-arrow" id="navLeft">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="play-pause-icon" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
                <div id="playIndicator"></div>
            </div>
            <div class="nav-arrow" id="navRight">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
        </div>
        <div class="stats" id="stats">
            <span>Moves: <strong id="moves">0</strong></span>
            <span>Time: <strong id="timer">0:00</strong></span>
        </div>
    </div>
    <script src="script.js?v=7"></script>
</body>
</html>
